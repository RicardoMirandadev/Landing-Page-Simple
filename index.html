<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Simple</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header><h1>Welcome to my webdite</h1></header>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
    <main>
      <section class="hero">
        <h2>Hero Section</h2>
        <p>This is a paragraph inside the hero section.</p>
        <button>Click Me</button>
        <img src="https://placehold.co/200x200" alt="hero image" />
      </section>
      <section class="contenido">
        <h2>Section Title</h2>
        <div>
          <p>Thus is a paragraph inside a div.</p>
          <ul>
            <li>List item 1</li>
            <li>List item 2</li>
            <li>List item 3</li>
          </ul>
          <p>Another paragraph with more content.</p>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2020 My Website</p>
    </footer>
  </body>
</html>
